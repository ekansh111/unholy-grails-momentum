# Nifty 500 market config. Data + costs + benchmarks identical to the Clenow
# India baseline (clenowMomentum/configNiftyBook.yaml).
market: india
currency: "Rs"

data_dir: /Users/ekanshgowda/Documents/Code/clenowMomentum/data/raw/pricesNse
constituents_file: /Users/ekanshgowda/Documents/Code/clenowMomentum/data/raw/constituents/nifty500Historical.csv
regime_symbol: BSESN.INDX         # Sensex — regime/index filter (75d SMA); history from 1997
report_symbol: CRSLDX.INDX        # Nifty 500 index — Buy & Hold benchmark; data from 2005 only
benchmark_name: "Nifty 500"
regime_name: "Sensex"
drop_sentinels: ["#N/A"]          # NSE change-row blob carries a junk sentinel as first ticker

# Comparison window: Nifty 500 change-row universe begins 1998-08.
start_date: "1998-09-01"
end_date: "2026-04-30"

# Accounting — matches Clenow India book config exactly (Zerodha-era realism).
initial_capital: 1000000
slippage_bps: 15
commission_per_trade: 20

# Portfolio
max_positions: 20
liquidity_floor: 5000000          # Rs 50L 21-day avg turnover floor
